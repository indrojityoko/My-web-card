<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ようこそ</title>

<style>

body {
  margin: 0;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  background: #0a0a0a;
  transition: background 1s ease;
}

/* glow background */
body::before,
body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.6;
}

body::before {
  background: #ff2d2d;
  top: -100px;
  left: -100px;
}

body::after {
  background: #7a00ff;
  bottom: -120px;
  right: -120px;
}

/* CARD */
.card {
  width: 340px;
  border-radius: 30px;
  padding: 22px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(30px);

  border: 1px solid rgba(255,255,255,0.12);

  box-shadow: 0 20px 60px rgba(0,0,0,0.7);

  animation: float 4s ease-in-out infinite;
  transition: all 0.8s ease;
  position: relative;
  z-index: 2;
}

@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

/* PROFILE */
.profile {
  text-align: center;
}

.profile img {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255,255,255,0.2);
}

/* TEXT */
.name {
  text-align: center;
  margin-top: 12px;
  color: white;
  font-size: 22px;
  font-weight: 600;
}

.desc {
  margin: 15px 0;
  padding: 12px;
  text-align: center;
  border-radius: 16px;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 14px;
}

.details {
  color: #ddd;
  font-size: 14px;
}

.details p {
  margin: 8px 0;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.label {
  color: #ff4d4d;
  font-weight: 600;
}

/* SOCIAL ROW */
.socials {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin: 20px 0;
}

.glass-icon {
  width: 78px;
  height: 78px;
  border-radius: 24px;

  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(25px);

  display: flex;
  align-items: center;
  justify-content: center;

  transition: 0.5s ease;
}

.glass-icon:active {
  transform: scale(0.92);
}

/* INSTAGRAM ICON */
.ig-bg {
  fill: rgba(255,255,255,0.15);
  stroke: rgba(255,255,255,0.5);
}

.ig-stroke {
  stroke: white;
  stroke-width: 1.5;
}

.ig-dot {
  fill: white;
}

/* TIKTOK ICON */
.tt-bg {
  fill: rgba(255,255,255,0.15);
  stroke: rgba(255,255,255,0.5);
}

.tt-icon {
  fill: none;
  stroke: white;
  stroke-width: 1.6;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* BUTTON */
.button {
  text-align: center;
}

.button button {
  padding: 11px 28px;
  border-radius: 30px;
  border: none;

  background: rgba(255,255,255,0.1);
  color: white;

  backdrop-filter: blur(15px);

  box-shadow: 0 0 20px rgba(255,0,0,0.4);

  cursor: pointer;
  transition: 0.5s;
}

/* LIGHT MODE */
body.light {
  background: linear-gradient(135deg, #e9ecff, #ffffff);
}

body.light .card {
  background: rgba(255,255,255,0.55);
}

body.light .name,
body.light .desc,
body.light .details {
  color: #111;
}

/* ICON FIX LIGHT MODE */
body.light .ig-bg {
  fill: rgba(0,0,0,0.08);
  stroke: rgba(0,0,0,0.3);
}

body.light .ig-stroke,
body.light .ig-dot {
  stroke: #111;
  fill: #111;
}

body.light .tt-bg {
  fill: rgba(0,0,0,0.08);
  stroke: rgba(0,0,0,0.3);
}

body.light .tt-icon {
  stroke: #111;
}

body.light .button button {
  color: #111;
}

</style>
</head>

<body>

<div class="card">

  <div class="profile">
    <img src="https://lh3.googleusercontent.com/d/1xhMsGlGHDU2zcVARtJ__LRU9Bm-sPS7K">
  </div>

  <div class="name">Indrojit</div>

  <div class="desc">Turning ideas into reality</div>

  <div class="details">
    <p><span class="label">Institution:</span> BLSC, Bogura</p>
    <p><span class="label">Status:</span> Student</p>
    <p><span class="label">Gender:</span> Male</p>
    <p><span class="label">Age:</span> 18+</p>
    <p><span class="label">Hobby:</span> Gaming / Music</p>
  </div>

  <!-- SOCIALS -->
  <div class="socials">

    <!-- INSTAGRAM -->
    <a href="https://www.instagram.com/indrooo_1" target="_blank">
      <div class="glass-icon">
        <svg width="42" height="42" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="6" class="ig-bg"/>
          <circle cx="12" cy="12" r="4" class="ig-stroke"/>
          <circle cx="17.5" cy="6.5" r="1.2" class="ig-dot"/>
        </svg>
      </div>
    </a>

    <!-- TIKTOK -->
    <a href="https://www.tiktok.com/@indro_x2z?_r=1&_t=ZS-95KhMa7rn44" target="_blank">
      <div class="glass-icon">
        <svg width="42" height="42" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="6" class="tt-bg"/>
          <path class="tt-icon" d="M14 3v9.2a3.8 3.8 0 1 1-3-3.7"/>
        </svg>
      </div>
    </a>

  </div>

  <div class="button">
    <button onclick="toggleTheme()">SWITCH</button>
  </div>

</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
