<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indrojit Bio Card</title>

  <style>
    :root {
      --bg: linear-gradient(135deg, #2b0000, #120000);
      --card: #1a0a0a;
      --text: #f5f5f5;
      --accent: #ff2e2e;
    }

    body.dark {
      --bg: linear-gradient(135deg, #0a0000, #000000);
      --card: #140000;
      --text: #f2f2f2;
      --accent: #ff4444;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.3s;
    }

    .card {
      background: var(--card);
      width: 340px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(255,0,0,0.2);
      animation: fadeIn 1s ease;
      border: 1px solid rgba(255,0,0,0.2);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile {
      text-align: center;
      padding: 20px;
    }

    .profile img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      object-fit: cover;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }

    .description {
      background: var(--accent);
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .details {
      padding: 20px;
      color: var(--text);
      font-size: 14px;
    }

    .details p {
      margin: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 5px;
    }

    .label {
      font-weight: bold;
      color: var(--accent);
    }

    .toggle {
      text-align: center;
      padding-bottom: 15px;
    }

    .toggle button {
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255,0,0,0.3);
    }
  </style>
</head>

<body>

<div class="card">

  <!-- PROFILE -->
  <div class="profile">
    <img src="https://lh3.googleusercontent.com/d/1xhMsGlGHDU2zcVARtJ__LRU9Bm-sPS7K" 
         onerror="this.src='https://via.placeholder.com/110'" 
         alt="Profile">
  </div>

  <!-- DESCRIPTION ONLY -->
  <div class="description" id="typing"></div>

  <!-- DETAILS -->
  <div class="details">
    <p><span class="label">Name:</span> INDRO</p>
    <p><span class="label">Institution:</span> BIAM Laboratory School & College</p>
    <p><span class="label">Education:</span> Student</p>
    <p><span class="label">Gender:</span> Male</p>
    <p><span class="label">Age:</span> 18+</p>
    <p><span class="label">Hobby:</span> Gaming / Music</p>
  </div>

  <!-- BUTTON -->
  <div class="toggle">
    <button onclick="toggleMode()">Toggle Mode</button>
  </div>

</div>

<script>
  function toggleMode() {
    document.body.classList.toggle("dark");
  }

  const text = "Turning ideas into reality";
  let i = 0;

  function type() {
    if (i < text.length) {
      document.getElementById("typing").innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 50);
    }
  }

  type();
</script>

</body>
</html>
